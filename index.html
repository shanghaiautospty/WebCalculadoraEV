<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shanghai Autos - Calculadora EV</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<h1>Shanghai Autos - Calculadora EV Pro</h1>
<select id="lang">
<option value="es">Español</option>
<option value="en">English</option>
</select>
</header>

<section class="card">
<h2>Comparador de Vehículos</h2>
<select id="vehicle1"></select>
<select id="vehicle2"></select>
<select id="vehicle3"></select>

<input id="electricity" type="number" step="0.01" value="0.18" placeholder="Tarifa eléctrica">
<input id="monthlyKm" type="number" value="2000" placeholder="Km mensuales">

<button onclick="calculate()">Calcular</button>
<button onclick="window.print()">Exportar PDF</button>
</section>

<section class="card">
<div id="results"></div>
</section>

<section class="card">
<h2>Solicitar Cotización</h2>
<input id="name" placeholder="Nombre">
<input id="phone" placeholder="WhatsApp">
<button onclick="sendWhatsApp()">Enviar por WhatsApp</button>
</section>

<script src="js/vehicles.js"></script>
<script src="js/app.js"></script>
</body>
</html>
